name: Release Obsidian Plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        run: |
          test -f dist/main.js
          test -f dist/manifest.json
          test -f dist/styles.css

      - name: Validate package and manifest versions
        run: |
          MANIFEST_VERSION=$(node -p "require('./dist/manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Manifest version: ${MANIFEST_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          if [ "${PACKAGE_VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "Version mismatch: package ${PACKAGE_VERSION} != manifest ${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Validate tag version matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./dist/manifest.json').version")
          echo "Tag version: ${TAG_VERSION}"
          echo "Manifest version: ${MANIFEST_VERSION}"
          if [ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "Version mismatch: tag v${TAG_VERSION} != manifest ${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
